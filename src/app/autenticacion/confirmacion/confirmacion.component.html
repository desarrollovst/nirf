<div class="container-fluid p-v-20 h-100">
    <div class="d-flex flex-column h-100 justify-content-between">
        <app-auth-header class="d-none d-md-block"></app-auth-header>
        <nz-spin [nzSpinning]="loading" nzTip="Validando...">
        <div class="container" *ngIf="valido">
            <div class="row align-items-center">
                <div class="col-md-5">
                    <div class="p-v-30">
                        <app-auth-header class="d-block d-md-none"></app-auth-header>
                        <h2 class="font-weight-semibold display-1 text-primary font-size-40">Confirmación exitosa</h2>
                        <p class="lead m-b-30">Utilice su email y contraseña para ingresar</p>
                        <a [routerLink]="['/autenticacion/login']" nz-button nzType="primary">Ingresar</a>
                    </div>
                </div>
                <div class="col-md-6 m-l-auto d-none d-md-block">
                    <img class="img-fluid" src="assets/images/others/error-1.png" alt="">
                </div>
            </div>
        </div>
        <div class="container" *ngIf="error">
            <div class="row align-items-center">
                <div class="col-md-5">
                    <nz-card>
                        <app-auth-header class="d-block d-md-none"></app-auth-header>
                        <h2 class="m-t-20">Confirmación no válida</h2>
                        <p class="m-b-30">Realice el reenvío del correo de confirmación</p>
                        <form nz-form [formGroup]="confirmacionForm" nzLayout="vertical" class="login-form" (ngSubmit)="submit()">
                            <nz-form-item>
                                <nz-form-label nzRequired nzFor="email">Email</nz-form-label>
                                <nz-form-control [nzErrorTip]="mailErrorTpl">
                                    <nz-input-group [nzPrefix]="prefixUser">
                                        <input type="text" nz-input formControlName="email" placeholder="Email">
                                    </nz-input-group>
                                </nz-form-control>
                                <ng-template #mailErrorTpl>
                                    <ng-container *ngIf="confirmacionForm.get('email')?.hasError('required')">
                                        Capture su correo electrónico
                                    </ng-container>

                                    <ng-container *ngIf="confirmacionForm.get('email')?.hasError('email')">
                                        Capture un correo electrónico válido
                                    </ng-container>
                                </ng-template>
                            </nz-form-item>
                            <nz-form-item>
                                <nz-form-control>
                                    <div class="d-flex align-items-center justify-content-between">
                                        <button nz-button class="login-form-button" [nzType]="'primary'">Reenviar</button>
                                    </div>
                                </nz-form-control>
                            </nz-form-item>
                        </form>
                        <ng-template #prefixUser><i nz-icon nzType="user"></i></ng-template>
                    </nz-card>
                </div>
                <div class="col-md-6 m-l-auto d-none d-md-block">
                    <img class="img-fluid" src="assets/images/others/error-1.png" alt="">
                </div>
            </div>
        </div>
        </nz-spin>
        <div class="d-none d-md-flex p-h-40 justify-content-between">
            <span class="">© 2026 NIRF</span>
        </div>
    </div>
</div>
