<div class="container-fluid h-100">
    <div class="d-flex h-100 p-v-15 flex-column justify-content-between">
        <app-auth-header class="d-none d-md-block"></app-auth-header>
        <nz-spin [nzSpinning]="loading" nzTip="Validando...">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-5">
                    <nz-card>
                        <app-auth-header class="d-block d-md-none"></app-auth-header>
                        <h2 class="m-t-20">Inicio de sesión</h2>
                        <p class="m-b-30">Capture sus datos para ingresar</p>
                        <form nz-form [formGroup]="loginForm" nzLayout="vertical" class="login-form" (ngSubmit)="submitForm()">
                            <nz-form-item>
                                <nz-form-label nzRequired nzFor="email">Email</nz-form-label>
                                <nz-form-control [nzErrorTip]="mailErrorTpl">
                                    <nz-input-group [nzPrefix]="prefixUser">
                                        <input type="text" nz-input formControlName="email" placeholder="Email">
                                    </nz-input-group>
                                </nz-form-control>
                                <ng-template #mailErrorTpl>
                                    <ng-container *ngIf="loginForm.get('email')?.hasError('required')">
                                        Capture su correo electrónico
                                    </ng-container>

                                    <ng-container *ngIf="loginForm.get('email')?.hasError('email')">
                                        Capture un correo electrónico válido
                                    </ng-container>
                                </ng-template>
                            </nz-form-item>
                            <nz-form-item class="relative">
                                <nz-form-label nzRequired nzFor="password">Contraseña</nz-form-label>
                                <nz-form-control nzErrorTip="Capture su contraseña">
                                    <nz-input-group [nzPrefix]="prefixLock">
                                        <input type="password" nz-input formControlName="password" placeholder="Contraseña">
                                    </nz-input-group>
                                </nz-form-control>
                                <a class="float-right font-size-13 text-muted" style="position:absolute; right: 0" [routerLink]="['/autenticacion/recuperacion']">¿Olvidó su Contraseña?</a>                                
                            </nz-form-item>
                            <nz-form-item>
                                <nz-form-control>
                                    <div class="d-flex align-items-center justify-content-between">
                                        <span class="font-size-13 text-muted">¿No tiene cuenta? <a class="small" [routerLink]="['/autenticacion/registro']"> Regístrese</a></span>
                                        <button nz-button class="login-form-button" [nzType]="'primary'">Ingresar</button>
                                    </div>
                                </nz-form-control>
                            </nz-form-item>
                        </form>
                        <ng-template #prefixUser><i nz-icon nzType="user"></i></ng-template>
                        <ng-template #prefixLock><i nz-icon nzType="lock"></i></ng-template>
                    </nz-card>
                </div>
                <div class="offset-md-1 col-md-6 d-none d-md-block">
                    <img class="img-fluid" src="assets/images/others/login-2.png" alt="">
                </div>
            </div>
        </div>
        </nz-spin>
        <div class="d-none d-md-flex  p-h-40 justify-content-between">
            <span class="">© 2026 NIRF</span>
        </div>
    </div>
</div>
